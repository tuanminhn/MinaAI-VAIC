services:
  postgres:
    image: postgres:16-alpine
    container_name: mina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MINA_POSTGRES_DB:-mina_dev}
      POSTGRES_USER: ${MINA_POSTGRES_USER:-mina_app}
      POSTGRES_PASSWORD: ${MINA_POSTGRES_PASSWORD:-mina_dev_password}
    volumes:
      - mina_postgres_data:/var/lib/postgresql/data
      - ./backend/docker/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${MINA_POSTGRES_USER:-mina_app} -d ${MINA_POSTGRES_DB:-mina_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: mina-backend
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: mina-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  mina_postgres_data:
